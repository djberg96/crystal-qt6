name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "**/*.markdown"
      - "**/*.tex"
      - "**/*.ltx"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "**/*.markdown"
      - "**/*.tex"
      - "**/*.ltx"

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install Qt6 dependencies on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config qt6-base-dev libqt6svg6-dev xvfb

      - name: Install Qt6 dependencies on macOS
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew list pkg-config >/dev/null 2>&1 || brew install pkg-config
          brew list qt >/dev/null 2>&1 || brew install qt
          qt_prefix="$(brew --prefix qt)"
          echo "$qt_prefix/bin" >> "$GITHUB_PATH"
          echo "PKG_CONFIG_PATH=$qt_prefix/lib/pkgconfig:$qt_prefix/share/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> "$GITHUB_ENV"

      - name: Show toolchain versions
        run: |
          crystal --version
          shards --version
          pkg-config --modversion Qt6Widgets
          pkg-config --modversion Qt6Svg
          pkg-config --modversion Qt6SvgWidgets

      - name: Run GUI specs
        run: make gui-spec

      - name: Compile examples
        run: |
          crystal build examples/hello_world.cr -o /tmp/crystal-qt6-hello
          crystal build examples/counter.cr -o /tmp/crystal-qt6-counter
          crystal build examples/editor_shell.cr -o /tmp/crystal-qt6-shell
          crystal build examples/editor_vertical_slice.cr -o /tmp/crystal-qt6-slice
          crystal build examples/desktop_editor_showcase.cr -o /tmp/crystal-qt6-showcase
          crystal build examples/event_monitor.cr -o /tmp/crystal-qt6-events
          crystal build examples/rendering_stack.cr -o /tmp/crystal-qt6-render
          crystal build examples/svg_widget_renderer.cr -o /tmp/crystal-qt6-svg
          crystal build examples/inspector_workbench.cr -o /tmp/crystal-qt6-inspector
          crystal build examples/model_view_workbench.cr -o /tmp/crystal-qt6-modelview
          crystal build examples/application_services_showcase.cr -o /tmp/crystal-qt6-services
          crystal build examples/dialog_gallery.cr -o /tmp/crystal-qt6-dialogs
